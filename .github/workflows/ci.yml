name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:
        inputs:
            node-version:
                description: 'Node.js version (overrides .nvmrc)'
                required: false

permissions:
    contents: read

env:
    NODE_VERSION: ${{ github.event.inputs.node-version || '24' }}

jobs:
    install:
        name: 📦 Install
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules cache
              id: cache
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - name: Install dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm ci

    audit:
        name: 🔒 Audit
        needs: install
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules cache
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - name: Security audit
              run: npm audit --audit-level=high

    outdated:
        name: ⏰ Outdated
        needs: install
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules cache
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - name: Check outdated dependencies
              run: npm outdated
              continue-on-error: true

    lint:
        name: 🔍 Lint
        needs: [audit, outdated]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules cache
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - name: Lint
              run: npm run lint

    test:
        name: 🧪 Test
        needs: [audit, outdated]
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}

            - name: Restore node_modules cache
              uses: actions/cache@v5
              with:
                  path: node_modules
                  key: node-modules-${{ hashFiles('package-lock.json') }}

            - name: Test with coverage (≥75%)
              run: npm run test:coverage
